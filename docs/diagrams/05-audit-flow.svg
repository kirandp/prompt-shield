<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 350" width="920" height="350" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="12">
  <defs>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>
  </defs>

  <rect width="920" height="350" fill="#ffffff"/>

  <text x="460" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Audit Event Pipeline</text>

  <rect x="20" y="60" width="180" height="200" rx="8" fill="#dbeafe" stroke="#4285f4"/>
  <text x="110" y="84" text-anchor="middle" font-weight="700" fill="#1e3a8a">utils/audit.js</text>
  <text x="110" y="115" text-anchor="middle" font-size="11" fill="#1e40af">logDetectionEvent</text>
  <text x="110" y="135" text-anchor="middle" font-size="11" fill="#1e40af">logMaskingEvent</text>
  <text x="110" y="155" text-anchor="middle" font-size="11" fill="#1e40af">logBlockedEvent</text>
  <text x="110" y="195" text-anchor="middle" font-size="10" fill="#475569">Event payload:</text>
  <text x="110" y="212" text-anchor="middle" font-size="10" fill="#475569">{ count, categories,</text>
  <text x="110" y="226" text-anchor="middle" font-size="10" fill="#475569">  maxSeverity, mode,</text>
  <text x="110" y="240" text-anchor="middle" font-size="10" fill="#475569">  aiTool, action }</text>

  <line x1="200" y1="160" x2="265" y2="160" stroke="#15803d" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="232" y="152" text-anchor="middle" font-size="10" fill="#15803d">sendMessage</text>

  <rect x="270" y="60" width="180" height="200" rx="8" fill="#dbeafe" stroke="#4285f4"/>
  <text x="360" y="84" text-anchor="middle" font-weight="700" fill="#1e3a8a">background.js</text>
