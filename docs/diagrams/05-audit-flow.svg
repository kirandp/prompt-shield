  <text x="360" y="138" text-anchor="middle" font-size="10" fill="#475569">org_id (from auth)</text>
  <text x="360" y="155" text-anchor="middle" font-size="10" fill="#475569">user_id</text>
  <text x="360" y="172" text-anchor="middle" font-size="10" fill="#475569">session_id</text>
  <text x="360" y="189" text-anchor="middle" font-size="10" fill="#475569">timestamp</text>
  <text x="360" y="206" text-anchor="middle" font-size="10" fill="#475569">browser/version</text>
  <text x="360" y="240" text-anchor="middle" font-size="10" fill="#1e40af">batches if rate-limited</text>

  <line x1="450" y1="160" x2="515" y2="160" stroke="#15803d" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="482" y="152" text-anchor="middle" font-size="10" fill="#15803d">REST POST</text>

  <rect x="520" y="60" width="180" height="200" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="610" y="84" text-anchor="middle" font-weight="700" fill="#14532d">Supabase</text>
  <text x="610" y="100" text-anchor="middle" font-size="10" fill="#15803d">audit_events table</text>

  <rect x="535" y="115" width="150" height="32" rx="4" fill="#fff" stroke="#22c55e"/>
  <text x="610" y="135" text-anchor="middle" font-size="10" fill="#166534">INSERT only · no UPDATE</text>

  <rect x="535" y="155" width="150" height="32" rx="4" fill="#fff" stroke="#22c55e"/>
  <text x="610" y="175" text-anchor="middle" font-size="10" fill="#166534">RLS by org_id</text>

  <rect x="535" y="195" width="150" height="32" rx="4" fill="#fff" stroke="#22c55e"/>
  <text x="610" y="215" text-anchor="middle" font-size="10" fill="#166534">indexed (org, ts, type)</text>

  <text x="610" y="248" text-anchor="middle" font-size="10" fill="#15803d">retention: org policy</text>

  <line x1="700" y1="160" x2="755" y2="160" stroke="#15803d" stroke-width="1.5" marker-end="url(#arr4)"/>

  <rect x="760" y="60" width="140" height="200" rx="8" fill="#ecfdf5" stroke="#0f6e56"/>
  <text x="830" y="84" text-anchor="middle" font-weight="700" fill="#064e3b">Dashboard</text>
  <text x="830" y="105" text-anchor="middle" font-size="10" fill="#065f46">/audit · /dashboard</text>
  <text x="830" y="135" text-anchor="middle" font-size="10" fill="#065f46">Real-time tail</text>
  <text x="830" y="152" text-anchor="middle" font-size="10" fill="#065f46">Search · filter</text>
  <text x="830" y="169" text-anchor="middle" font-size="10" fill="#065f46">CSV export</text>
  <text x="830" y="186" text-anchor="middle" font-size="10" fill="#065f46">Compliance reports</text>

  <rect x="20" y="280" width="880" height="55" rx="8" fill="#fef2f2" stroke="#dc2626"/>
  <text x="460" y="302" text-anchor="middle" font-weight="700" fill="#7f1d1d" font-size="13">What is NEVER logged</text>
  <text x="460" y="322" text-anchor="middle" fill="#991b1b" font-size="11">raw pasted text · detected values · token map · AI prompts · AI responses</text>
</svg>
