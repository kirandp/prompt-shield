<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 540" width="940" height="540" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="12">
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b5563"/>
    </marker>
  </defs>

  <rect width="940" height="540" fill="#ffffff"/>

  <text x="470" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Three Modes — Branching Behavior</text>

  <rect x="320" y="55" width="300" height="60" rx="8" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="470" y="78" text-anchor="middle" font-weight="700" fill="#1a1a1a">Detections found (length &gt; 0)</text>
  <text x="470" y="98" text-anchor="middle" fill="#475569" font-size="11">switch (state.mode) →</text>

  <line x1="470" y1="115" x2="160" y2="155" stroke="#4b5563" marker-end="url(#arr3)"/>
  <line x1="470" y1="115" x2="470" y2="155" stroke="#4b5563" marker-end="url(#arr3)"/>
  <line x1="470" y1="115" x2="780" y2="155" stroke="#4b5563" marker-end="url(#arr3)"/>

  <rect x="40" y="160" width="245" height="345" rx="10" fill="#f5f3ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="162" y="185" text-anchor="middle" font-weight="700" fill="#581c87" font-size="14">SHADOW</text>
  <text x="162" y="202" text-anchor="middle" fill="#6b21a8" font-size="10">silent · log-only</text>

  <rect x="60" y="220" width="205" height="40" rx="5" fill="#fff" stroke="#a855f7"/>
  <text x="162" y="244" text-anchor="middle" font-size="11" fill="#581c87">1. logDetectionEvent()</text>

  <rect x="60" y="270" width="205" height="40" rx="5" fill="#fff" stroke="#a855f7"/>
  <text x="162" y="294" text-anchor="middle" font-size="11" fill="#581c87">2. allow paste through</text>

  <rect x="60" y="320" width="205" height="40" rx="5" fill="#fff" stroke="#a855f7"/>
  <text x="162" y="344" text-anchor="middle" font-size="11" fill="#581c87">3. discreet badge update</text>

  <text x="162" y="395" text-anchor="middle" font-size="11" font-weight="700" fill="#581c87">USE CASE</text>
  <text x="162" y="412" text-anchor="middle" font-size="10" fill="#6b21a8">Pre-rollout assessment</text>
  <text x="162" y="426" text-anchor="middle" font-size="10" fill="#6b21a8">Risk profiling without</text>
  <text x="162" y="440" text-anchor="middle" font-size="10" fill="#6b21a8">user disruption</text>

  <text x="162" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">no protection</text>
  <text x="162" y="487" text-anchor="middle" font-size="10" fill="#7f1d1d">raw data still reaches AI</text>

  <rect x="345" y="160" width="245" height="345" rx="10" fill="#dbeafe" stroke="#4285f4" stroke-width="1.5"/>
  <text x="467" y="185" text-anchor="middle" font-weight="700" fill="#1e3a8a" font-size="14">FIX (Auto-Shield)</text>
  <text x="467" y="202" text-anchor="middle" fill="#1e40af" font-size="10">automatic · seamless</text>

  <rect x="365" y="220" width="205" height="40" rx="5" fill="#fff" stroke="#4285f4"/>
  <text x="467" y="244" text-anchor="middle" font-size="11" fill="#1e3a8a">1. buildMasked() → tokens</text>

  <rect x="365" y="270" width="205" height="40" rx="5" fill="#fff" stroke="#4285f4"/>
  <text x="467" y="294" text-anchor="middle" font-size="11" fill="#1e3a8a">2. element.value = masked</text>

  <rect x="365" y="320" width="205" height="40" rx="5" fill="#fff" stroke="#4285f4"/>
  <text x="467" y="344" text-anchor="middle" font-size="11" fill="#1e3a8a">3. logMaskingEvent() + toast</text>

  <text x="467" y="395" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">USE CASE</text>
  <text x="467" y="412" text-anchor="middle" font-size="10" fill="#1e40af">Default production mode</text>
  <text x="467" y="426" text-anchor="middle" font-size="10" fill="#1e40af">Trusted detection accuracy</text>
  <text x="467" y="440" text-anchor="middle" font-size="10" fill="#1e40af">Zero friction</text>

  <text x="467" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">active protection</text>
  <text x="467" y="487" text-anchor="middle" font-size="10" fill="#15803d">tokens reversed in responses</text>

  <rect x="650" y="160" width="245" height="345" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="772" y="185" text-anchor="middle" font-weight="700" fill="#78350f" font-size="14">WARN (Guard)</text>
  <text x="772" y="202" text-anchor="middle" fill="#92400e" font-size="10">interactive · consent-first</text>

  <rect x="670" y="220" width="205" height="40" rx="5" fill="#fff" stroke="#f59e0b"/>
  <text x="772" y="244" text-anchor="middle" font-size="11" fill="#78350f">1. preventDefault paste</text>

  <rect x="670" y="270" width="205" height="40" rx="5" fill="#fff" stroke="#f59e0b"/>
  <text x="772" y="294" text-anchor="middle" font-size="11" fill="#78350f">2. show overlay (3 panels)</text>

  <rect x="670" y="320" width="205" height="40" rx="5" fill="#fff" stroke="#f59e0b"/>
  <text x="772" y="344" text-anchor="middle" font-size="11" fill="#78350f">3. user picks: mask · edit · block</text>

  <text x="772" y="395" text-anchor="middle" font-size="11" font-weight="700" fill="#78350f">USE CASE</text>
  <text x="772" y="412" text-anchor="middle" font-size="10" fill="#92400e">Regulated industries</text>
  <text x="772" y="426" text-anchor="middle" font-size="10" fill="#92400e">User training rollout</text>
  <text x="772" y="440" text-anchor="middle" font-size="10" fill="#92400e">High-risk PHI/secrets</text>

  <text x="772" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">explicit consent</text>
  <text x="772" y="487" text-anchor="middle" font-size="10" fill="#15803d">audit captures user choice</text>
</svg>
